runtime: tflite
precision: float
tool_versions:
  qairt: 2.43.0.260127150333_193827
  tflite: 2.17.0
model_files:
  FaceDetector.tflite:
    inputs:
      image:
        shape: [1, 256, 256, 3]
        dtype: float32
    outputs:
      box_coords_1:
        shape: [1, 512, 16]
        dtype: float32
      box_coords_2:
        shape: [1, 384, 16]
        dtype: float32
      box_scores_1:
        shape: [1, 512, 1]
        dtype: float32
      box_scores_2:
        shape: [1, 384, 1]
        dtype: float32
  FaceLandmarkDetector.tflite:
    inputs:
      image:
        shape: [1, 192, 192, 3]
        dtype: float32
    outputs:
      scores:
        shape: [1]
        dtype: float32
      landmarks:
        shape: [1, 468, 3]
        dtype: float32
